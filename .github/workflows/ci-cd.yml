name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/tesflix

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test

  build-push:
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Initialise Terraform
        working-directory: ./terraform
        run: terraform init
      - name: Apply Terraform (infra)
        working-directory: ./terraform
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
        run: terraform apply -auto-approve
      - name: Deploy Helm chart to EKS
        env:
          KUBECONFIG: ${{ steps.configure-aws.outputs.kubeconfig }}
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install tesflix ./helm/tesflix \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }} \
            --set domain=${{ vars.DOMAIN_NAME }}
