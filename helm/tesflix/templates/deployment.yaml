apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tesflix.fullname" . }}
  labels:
    {{- include "tesflix.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tesflix.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tesflix.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "tesflix.fullname" . }}-config
            - secretRef:
                name: {{ include "tesflix.fullname" . }}-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
