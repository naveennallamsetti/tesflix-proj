# helm/tesflix/values.yaml
replicaCount: 3

image:
  repository: "<DOCKERHUB_USERNAME>/tesflix"
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: "<DOMAIN>"
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - secretName: tesflix-tls
      hosts:
        - "<DOMAIN>"

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

nodeSelector: {}
tolerations: []
affinity: {}
